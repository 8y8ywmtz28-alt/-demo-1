name: Deploy World Cup Forecast to PageDrop

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'worldcup-real/**'
      - '.github/workflows/deploy-worldcup-pagedrop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'worldcup-real/**'
      - '.github/workflows/deploy-worldcup-pagedrop.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare mobile-friendly build
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/class="btn desktop" id="sourceBtn"/class="btn" id="sourceBtn"/' worldcup-real/index.html
          sed -i 's/class="btn" id="shareBtn"/class="btn desktop" id="shareBtn"/' worldcup-real/index.html

      - name: Deploy permanent static page
        id: deploy
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          report_path = Path('deployment-report.json')
          live_path = Path('live-url.txt')
          output_path = Path(os.environ['GITHUB_OUTPUT'])
          report = {'status': 'unknown'}
          status = 0

          try:
              html = Path('worldcup-real/index.html').read_text(encoding='utf-8')
              slug = f"worldcup-forecast-{os.environ['GITHUB_SHA'][:8].lower()}"
              payload = json.dumps({
                  'html': html,
                  'slug': slug,
                  'ogTitle': 'World Cup Forecast Lab',
                  'ogDescription': '真实 Elo、近5场状态与 FIFA xG 驱动的世界杯概率模型',
              }, ensure_ascii=False).encode('utf-8')
              request = urllib.request.Request(
                  'https://pagedrop.dev/api/v1/sites',
                  data=payload,
                  headers={'Content-Type': 'application/json', 'User-Agent': 'WorldCupForecastLab/1.0'},
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      status = response.status
                      body = response.read().decode('utf-8', errors='replace')
              except urllib.error.HTTPError as exc:
                  status = exc.code
                  body = exc.read().decode('utf-8', errors='replace')

              try:
                  parsed = json.loads(body)
              except json.JSONDecodeError:
                  parsed = {'rawResponse': body}
              if isinstance(parsed, dict) and isinstance(parsed.get('data'), dict):
                  parsed['data'].pop('deleteToken', None)
              report = {'httpCode': status, 'response': parsed}

              if status == 201 and isinstance(parsed, dict):
                  url = parsed.get('data', {}).get('url', '')
                  if url:
                      live_path.write_text(url + '\n', encoding='utf-8')
                      with output_path.open('a', encoding='utf-8') as out:
                          out.write(f'url={url}\n')
                  else:
                      report['error'] = '201 response contained no public URL'
          except Exception as exc:
              report = {
                  'httpCode': status,
                  'exceptionType': type(exc).__name__,
                  'exception': str(exc),
              }

          report_path.write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          with output_path.open('a', encoding='utf-8') as out:
              out.write(f'http_code={status}\n')
          print(json.dumps(report, ensure_ascii=False))
          PY

      - name: Upload deployment diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pagedrop-deployment-report
          path: deployment-report.json
          retention-days: 7

      - name: Upload live URL
        if: steps.deploy.outputs.http_code == '201'
        uses: actions/upload-artifact@v4
        with:
          name: pagedrop-live-url
          path: live-url.txt
          retention-days: 7

      - name: Validate deployment
        if: steps.deploy.outputs.http_code != '201'
        shell: bash
        run: |
          cat deployment-report.json
          exit 1
