name: Deploy World Cup Forecast to Netlify

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'worldcup-real/**'
      - '.github/workflows/deploy-worldcup-pagedrop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'worldcup-real/**'
      - '.github/workflows/deploy-worldcup-pagedrop.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare mobile-friendly build
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/class="btn desktop" id="sourceBtn"/class="btn" id="sourceBtn"/' worldcup-real/index.html
          sed -i 's/class="btn" id="shareBtn"/class="btn desktop" id="shareBtn"/' worldcup-real/index.html

      - name: Deploy anonymous Netlify preview
        id: deploy
        shell: bash
        run: |
          set +e
          : > netlify-output.json
          : > netlify-error.log
          npx --yes netlify-cli@latest deploy \
            --allow-anonymous \
            --dir=worldcup-real \
            --no-build \
            --json > netlify-output.json 2> netlify-error.log
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          stdout = Path('netlify-output.json').read_text(encoding='utf-8', errors='replace')
          stderr = Path('netlify-error.log').read_text(encoding='utf-8', errors='replace')
          parsed = None
          try:
              parsed = json.loads(stdout)
          except Exception:
              start = stdout.find('{')
              end = stdout.rfind('}')
              if start >= 0 and end > start:
                  try:
                      parsed = json.loads(stdout[start:end + 1])
                  except Exception:
                      parsed = None

          report = {
              'exitCode': int(os.environ.get('EXIT_CODE_FOR_REPORT', '0')),
              'stdout': parsed if parsed is not None else stdout,
              'stderr': stderr,
          }
          Path('deployment-report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8'
          )

          if isinstance(parsed, dict):
              url = parsed.get('deploy_url') or parsed.get('deployUrl') or parsed.get('url')
              claim = parsed.get('claim_url') or parsed.get('claimUrl')
              if url:
                  Path('live-url.txt').write_text(str(url) + '\n', encoding='utf-8')
                  with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as out:
                      out.write(f'url={url}\n')
              if claim:
                  Path('claim-url.txt').write_text(str(claim) + '\n', encoding='utf-8')
                  with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as out:
                      out.write(f'claim_url={claim}\n')
          PY
        env:
          EXIT_CODE_FOR_REPORT: ${{ steps.deploy.outputs.exit_code }}

      - name: Upload deployment report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netlify-deployment-report
          path: |
            deployment-report.json
            netlify-output.json
            netlify-error.log
          retention-days: 7

      - name: Upload live URL
        if: steps.deploy.outputs.url != ''
        uses: actions/upload-artifact@v4
        with:
          name: netlify-live-url
          path: |
            live-url.txt
            claim-url.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Validate deployment
        if: steps.deploy.outputs.url == ''
        shell: bash
        run: |
          cat deployment-report.json
          exit 1
