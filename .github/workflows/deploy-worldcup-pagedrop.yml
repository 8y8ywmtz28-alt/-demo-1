name: Deploy World Cup Forecast to PageDrop

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'worldcup-real/**'
      - '.github/workflows/deploy-worldcup-pagedrop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'worldcup-real/**'
      - '.github/workflows/deploy-worldcup-pagedrop.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare mobile-friendly build
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/class="btn desktop" id="sourceBtn"/class="btn" id="sourceBtn"/' worldcup-real/index.html
          sed -i 's/class="btn" id="shareBtn"/class="btn desktop" id="shareBtn"/' worldcup-real/index.html

      - name: Deploy permanent static page
        id: deploy
        shell: bash
        run: |
          set -u
          SLUG="worldcup-forecast-${GITHUB_SHA::8}"
          jq -n \
            --rawfile html worldcup-real/index.html \
            --arg slug "$SLUG" \
            --arg title "World Cup Forecast Lab" \
            --arg description "真实 Elo、近5场状态与 FIFA xG 驱动的世界杯概率模型" \
            '{html:$html, slug:$slug, ogTitle:$title, ogDescription:$description}' > payload.json

          HTTP_CODE=$(curl -sS -o response.json -w '%{http_code}' \
            -X POST 'https://pagedrop.dev/api/v1/sites' \
            -H 'Content-Type: application/json' \
            --data-binary @payload.json || printf '000')
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"

          if jq empty response.json >/dev/null 2>&1; then
            jq --arg http "$HTTP_CODE" \
              'if .data then .data |= del(.deleteToken) else . end | . + {httpCode:$http}' \
              response.json > deployment-report.json
          else
            jq -n --arg http "$HTTP_CODE" --rawfile body response.json \
              '{httpCode:$http, rawResponse:$body}' > deployment-report.json
          fi

          if [ "$HTTP_CODE" = "201" ]; then
            URL=$(jq -r '.data.url // empty' response.json)
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$URL" > live-url.txt
            echo "Deployment succeeded: $URL"
          else
            echo "PageDrop returned HTTP $HTTP_CODE; diagnostic artifact will be uploaded."
          fi

      - name: Upload deployment diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pagedrop-deployment-report
          path: deployment-report.json
          retention-days: 7

      - name: Upload live URL
        if: steps.deploy.outputs.http_code == '201'
        uses: actions/upload-artifact@v4
        with:
          name: pagedrop-live-url
          path: live-url.txt
          retention-days: 7

      - name: Validate deployment
        if: steps.deploy.outputs.http_code != '201'
        shell: bash
        run: |
          cat deployment-report.json
          exit 1
