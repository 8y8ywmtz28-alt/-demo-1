<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>世界杯冠军模型</title>
<style>
:root{--c:#64e6ff;--v:#9a7cff;--g:rgba(255,255,255,.1)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,"PingFang SC",sans-serif;color:#f7fbff;background:radial-gradient(circle at 15% 15%,#123758 0,transparent 28%),radial-gradient(circle at 90% 10%,#34205c 0,transparent 30%),#07111d}.wrap{width:min(1100px,92%);margin:auto;padding:28px}.glass{background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(22px);border-radius:24px;box-shadow:0 25px 70px rgba(0,0,0,.35)}header{padding:24px;margin-bottom:18px}h1{margin:0 0 8px;font-size:clamp(28px,5vw,56px)}p{color:#9fb0c2}.grid{display:grid;grid-template-columns:340px 1fr;gap:18px}.panel{padding:22px}.row{margin:15px 0}.head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}input[type=range]{width:100%;accent-color:#6fe7ff}select,button,input[type=number]{width:100%;padding:12px;border-radius:13px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:white}option{background:#101a28}button{cursor:pointer;font-weight:700;background:linear-gradient(90deg,rgba(100,230,255,.28),rgba(154,124,255,.32));transition:.2s}button:hover{transform:translateY(-2px)}.duel{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;text-align:center;margin:28px 0 18px}.flag{font-size:54px}.pct{font-size:34px;font-weight:800}.bar{height:14px;border-radius:999px;display:flex;overflow:hidden;background:rgba(255,255,255,.08)}.a{background:linear-gradient(90deg,var(--c),#5ca8ff)}.b{background:linear-gradient(90deg,#7f66ff,var(--v))}.outcomes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}.outcome{padding:12px;text-align:center;border-radius:14px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1)}.outcome span{display:block;font-size:12px;color:#9fb0c2;margin-bottom:5px}.outcome b{font-size:19px}.scorebox{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:14px 0;padding:14px 16px;border-radius:14px;background:rgba(100,230,255,.07);border:1px solid rgba(100,230,255,.16)}.scorebox span{color:#9fb0c2;font-size:13px}.scorebox b{font-size:22px}.recent-title{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}.recent-title h4{margin:0;font-size:14px}.recent-title small{color:#9fb0c2}.recent-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}.recent-card{padding:12px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09)}.recent-card strong{display:block;margin-bottom:10px;font-size:13px}.input-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}.input-pair label{font-size:11px;color:#9fb0c2}.input-pair input{margin-top:5px;padding:9px 8px}.recent-hint{font-size:11px;line-height:1.55;color:#8192a6;margin:-8px 0 16px}.rank{display:grid;gap:10px;margin-top:18px}.item{display:grid;grid-template-columns:36px 1fr 2fr 65px;gap:10px;align-items:center;padding:12px;border-radius:14px;background:rgba(255,255,255,.05)}.mini{height:8px;background:rgba(255,255,255,.09);border-radius:99px;overflow:hidden}.mini i{display:block;height:100%;background:linear-gradient(90deg,var(--c),var(--v))}.champ{font-size:18px;margin-top:8px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#122033;padding:11px 16px;border-radius:12px;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:820px){.grid{grid-template-columns:1fr}.wrap{padding:14px}.item{grid-template-columns:28px 1fr 1.3fr 58px}.recent-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap"><header class="glass"><h1>世界杯冠军概率实验室</h1><p>选择对阵、拖动权重、重新模拟，结果会即时变化。</p></header><div class="grid"><aside class="glass panel"><h3>模型控制台</h3><label>球队 A</label><select id="ta"></select><br><br><label>球队 B</label><select id="tb"></select><div class="recent-title"><h4>近5场手动修正</h4><small>自动记忆</small></div><div class="recent-grid" id="recentGrid"></div><p class="recent-hint">积分按胜3分、平1分计算；平均净胜球可填负数。它们会修正近期状态和预期进球。</p><div id="sliders"></div><button id="run">重新模拟 50,000 次</button></aside><main class="glass panel"><div>当前预测冠军</div><div class="champ"><span id="cf">🇪🇸</span> <b id="cn">西班牙</b> · <span id="cp">0%</span></div><div class="duel"><div><div class="flag" id="fa"></div><h3 id="na"></h3><div class="pct" id="pa"></div></div><b>VS</b><div><div class="flag" id="fb"></div><h3 id="nb"></h3><div class="pct" id="pb"></div></div></div><div class="bar"><div class="a" id="ba"></div><div class="b" id="bb"></div></div><div class="outcomes"><div class="outcome"><span id="winALabel">A队胜</span><b id="winA">0%</b></div><div class="outcome"><span>90分钟平局</span><b id="draw">0%</b></div><div class="outcome"><span id="winBLabel">B队胜</span><b id="winB">0%</b></div></div><div class="scorebox"><span>最可能比分</span><b id="likelyScore">1 : 0</b></div><p id="note"></p><h3>冠军概率排行</h3><div class="rank" id="rank"></div></main></div></div><div class="toast" id="toast">已刷新</div>
<script>
const T=[['ESP','西班牙','🇪🇸',94,96,97,95,88,92],['ARG','阿根廷','🇦🇷',93,92,90,91,98,90],['FRA','法国','🇫🇷',95,88,92,98,94,86],['ENG','英格兰','🏴',92,89,89,96,86,91],['BRA','巴西','🇧🇷',94,84,91,94,93,83],['POR','葡萄牙','🇵🇹',90,88,89,91,89,90],['GER','德国','🇩🇪',89,86,87,92,95,88],['NED','荷兰','🇳🇱',89,87,88,89,89,89],['MAR','摩洛哥','🇲🇦',84,90,84,80,82,91],['COL','哥伦比亚','🇨🇴',85,89,85,83,84,90]];
const F=[['长期实力',25],['近期状态',20],['攻防质量',25],['阵容深度',12],['大赛经验',10],['健康状态',8]];
const R={ESP:{pts:13,gd:1.8},ARG:{pts:12,gd:1.4},FRA:{pts:10,gd:1.1},ENG:{pts:11,gd:1.0},BRA:{pts:9,gd:.8},POR:{pts:11,gd:1.2},GER:{pts:10,gd:.9},NED:{pts:10,gd:.8},MAR:{pts:11,gd:.7},COL:{pts:12,gd:1.0}};
const $=s=>document.querySelector(s);
function init(){T.forEach(t=>{$('#ta').add(new Option(t[2]+' '+t[1],t[0]));$('#tb').add(new Option(t[2]+' '+t[1],t[0]))});$('#ta').value='ESP';$('#tb').value='ARG';$('#sliders').innerHTML=F.map((f,i)=>`<div class=row><div class=head><span>${f[0]}</span><b id=v${i}>${f[1]}%</b></div><input data-weight=${i} type=range min=0 max=45 value=${f[1]}></div>`).join('');document.querySelectorAll('[data-weight]').forEach(x=>x.oninput=()=>{F[x.dataset.weight][1]=+x.value;$('#v'+x.dataset.weight).textContent=x.value+'%';calc()});$('#ta').onchange=()=>{avoidSame('a');renderRecent();calc()};$('#tb').onchange=()=>{avoidSame('b');renderRecent();calc()};$('#run').onclick=()=>{T.forEach(t=>t.n=(Math.random()-.5)*1.2);calc();show()};renderRecent();calc()}
function avoidSame(changed){if($('#ta').value!==$('#tb').value)return;const other=T.find(t=>t[0]!==$('#'+(changed==='a'?'ta':'tb')).value);$('#'+(changed==='a'?'tb':'ta')).value=other[0]}
function renderRecent(){const a=T.find(t=>t[0]===$('#ta').value),b=T.find(t=>t[0]===$('#tb').value);$('#recentGrid').innerHTML=[a,b].map((t,i)=>`<div class=recent-card><strong>${t[2]} ${t[1]}</strong><div class=input-pair><label>近5场积分<input class=recent-input data-team=${t[0]} data-field=pts type=number min=0 max=15 step=1 value=${R[t[0]].pts}></label><label>平均净胜球<input class=recent-input data-team=${t[0]} data-field=gd type=number min=-3 max=3 step=.1 value=${R[t[0]].gd}></label></div></div>`).join('');document.querySelectorAll('.recent-input').forEach(x=>x.oninput=()=>{const field=x.dataset.field,min=field==='pts'?0:-3,max=field==='pts'?15:3;let v=Number(x.value);if(!Number.isFinite(v))return;v=Math.max(min,Math.min(max,v));R[x.dataset.team][field]=v;calc()})}
function recentRating(t){const r=R[t[0]];return Math.max(55,Math.min(99,58+r.pts*2.15+r.gd*4.2))}
function score(t){let s=F.reduce((a,f)=>a+f[1],0)||1;return F.reduce((a,f,i)=>{const value=i===1?t[i+3]*.62+recentRating(t)*.38:t[i+3];return a+value*f[1]/s},0)+(t.n||0)}
function ranking(){let r=T.map(t=>({t,s:score(t)})),m=Math.max(...r.map(x=>x.s)),e=r.map(x=>Math.exp((x.s-m)/4.2)),z=e.reduce((a,b)=>a+b,0);return r.map((x,i)=>({...x,p:e[i]/z*100})).sort((a,b)=>b.p-a.p)}
function factorial(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r}
function poisson(k,lambda){return Math.exp(-lambda)*Math.pow(lambda,k)/factorial(k)}
function expectedGoals(a,b){const qualityA=(a[5]*.55+a[3]*.2+a[4]*.15+a[6]*.1)/100,qualityB=(b[5]*.55+b[3]*.2+b[4]*.15+b[6]*.1)/100,defenceA=(a[5]*.45+a[3]*.2+a[6]*.2+a[8]*.15)/100,defenceB=(b[5]*.45+b[3]*.2+b[6]*.2+b[8]*.15)/100,formA=(a[4]-88)/100,formB=(b[4]-88)/100,ra=R[a[0]],rb=R[b[0]];let la=1.28*(qualityA/(defenceB||1))*(1+formA*.22),lb=1.28*(qualityB/(defenceA||1))*(1+formB*.22),gap=(score(a)-score(b))/100;la*=Math.exp(gap*.9+(ra.pts-7.5)*.018+ra.gd*.055);lb*=Math.exp(-gap*.9+(rb.pts-7.5)*.018+rb.gd*.055);return[Math.max(.35,Math.min(2.8,la)),Math.max(.35,Math.min(2.8,lb))]}
function poissonMatch(a,b){const[la,lb]=expectedGoals(a,b);let winA=0,draw=0,winB=0,best={p:-1,a:0,b:0};for(let ga=0;ga<=6;ga++){for(let gb=0;gb<=6;gb++){const p=poisson(ga,la)*poisson(gb,lb);if(ga>gb)winA+=p;else if(ga===gb)draw+=p;else winB+=p;if(p>best.p)best={p,a:ga,b:gb}}}const total=winA+draw+winB;return{winA:winA/total*100,draw:draw/total*100,winB:winB/total*100,score:`${best.a} : ${best.b}`,xgA:la,xgB:lb}}
function calc(){let r=ranking(),c=r[0],a=T.find(t=>t[0]===$('#ta').value),b=T.find(t=>t[0]===$('#tb').value);if(a===b){b=T.find(t=>t!==a);$('#tb').value=b[0]}const pm=poissonMatch(a,b),knockoutA=pm.winA+pm.draw*.5,knockoutB=pm.winB+pm.draw*.5;$('#cf').textContent=c.t[2];$('#cn').textContent=c.t[1];$('#cp').textContent=c.p.toFixed(1)+'%';$('#fa').textContent=a[2];$('#na').textContent=a[1];$('#pa').textContent=knockoutA.toFixed(1)+'%';$('#fb').textContent=b[2];$('#nb').textContent=b[1];$('#pb').textContent=knockoutB.toFixed(1)+'%';$('#ba').style.width=knockoutA+'%';$('#bb').style.width=knockoutB+'%';$('#winALabel').textContent=a[1]+'胜';$('#winBLabel').textContent=b[1]+'胜';$('#winA').textContent=pm.winA.toFixed(1)+'%';$('#draw').textContent=pm.draw.toFixed(1)+'%';$('#winB').textContent=pm.winB.toFixed(1)+'%';$('#likelyScore').textContent=pm.score;const fav=knockoutA>=50?a[1]:b[1];$('#note').textContent=`${fav}在淘汰赛晋级概率上略占优势。预期进球为 ${a[1]} ${pm.xgA.toFixed(2)}，${b[1]} ${pm.xgB.toFixed(2)}；近5场数据已参与近期状态修正，平局部分按加时与点球五五分摊。`;$('#rank').innerHTML=r.slice(0,8).map((x,i)=>`<div class=item><span>${i+1}</span><span>${x.t[2]} ${x.t[1]}</span><div class=mini><i style="width:${Math.min(100,x.p*3.2)}%"></i></div><b>${x.p.toFixed(1)}%</b></div>`).join('')}
function show(){let x=$('#toast');x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1400)}
init();
</script>
</body>
</html>
