<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>世界杯冠军模型</title><style>:root{--c:#64e6ff;--v:#9a7cff;--g:rgba(255,255,255,.1)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,"PingFang SC",sans-serif;color:#f7fbff;background:radial-gradient(circle at 15% 15%,#123758 0,transparent 28%),radial-gradient(circle at 90% 10%,#34205c 0,transparent 30%),#07111d}.wrap{width:min(1100px,92%);margin:auto;padding:28px}.glass{background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(22px);border-radius:24px;box-shadow:0 25px 70px rgba(0,0,0,.35)}header{padding:24px;margin-bottom:18px}h1{margin:0 0 8px;font-size:clamp(28px,5vw,56px)}p{color:#9fb0c2}.grid{display:grid;grid-template-columns:340px 1fr;gap:18px}.panel{padding:22px}.row{margin:15px 0}.head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}input[type=range]{width:100%;accent-color:#6fe7ff}select,button{width:100%;padding:12px;border-radius:13px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:white}option{background:#101a28}button{cursor:pointer;font-weight:700;background:linear-gradient(90deg,rgba(100,230,255,.28),rgba(154,124,255,.32));transition:.2s}button:hover{transform:translateY(-2px)}.duel{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;text-align:center;margin:28px 0}.flag{font-size:54px}.pct{font-size:34px;font-weight:800}.bar{height:14px;border-radius:999px;display:flex;overflow:hidden;background:rgba(255,255,255,.08)}.a{background:linear-gradient(90deg,var(--c),#5ca8ff)}.b{background:linear-gradient(90deg,#7f66ff,var(--v))}.rank{display:grid;gap:10px;margin-top:18px}.item{display:grid;grid-template-columns:36px 1fr 2fr 65px;gap:10px;align-items:center;padding:12px;border-radius:14px;background:rgba(255,255,255,.05)}.mini{height:8px;background:rgba(255,255,255,.09);border-radius:99px;overflow:hidden}.mini i{display:block;height:100%;background:linear-gradient(90deg,var(--c),var(--v))}.champ{font-size:18px;margin-top:8px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#122033;padding:11px 16px;border-radius:12px;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:820px){.grid{grid-template-columns:1fr}.wrap{padding:14px}.item{grid-template-columns:28px 1fr 1.3fr 58px}}</style></head><body><div class="wrap"><header class="glass"><h1>世界杯冠军概率实验室</h1><p>选择对阵、拖动权重、重新模拟，结果会即时变化。</p></header><div class="grid"><aside class="glass panel"><h3>模型控制台</h3><label>球队 A</label><select id="ta"></select><br><br><label>球队 B</label><select id="tb"></select><div id="sliders"></div><button id="run">重新模拟 50,000 次</button></aside><main class="glass panel"><div>当前预测冠军</div><div class="champ"><span id="cf">🇪🇸</span> <b id="cn">西班牙</b> · <span id="cp">0%</span></div><div class="duel"><div><div class="flag" id="fa"></div><h3 id="na"></h3><div class="pct" id="pa"></div></div><b>VS</b><div><div class="flag" id="fb"></div><h3 id="nb"></h3><div class="pct" id="pb"></div></div></div><div class="bar"><div class="a" id="ba"></div><div class="b" id="bb"></div></div><p id="note"></p><h3>冠军概率排行</h3><div class="rank" id="rank"></div></main></div></div><div class="toast" id="toast">已刷新</div><script>const T=[['ESP','西班牙','🇪🇸',94,96,97,95,88,92],['ARG','阿根廷','🇦🇷',93,92,90,91,98,90],['FRA','法国','🇫🇷',95,88,92,98,94,86],['ENG','英格兰','🏴',92,89,89,96,86,91],['BRA','巴西','🇧🇷',94,84,91,94,93,83],['POR','葡萄牙','🇵🇹',90,88,89,91,89,90],['GER','德国','🇩🇪',89,86,87,92,95,88],['NED','荷兰','🇳🇱',89,87,88,89,89,89],['MAR','摩洛哥','🇲🇦',84,90,84,80,82,91],['COL','哥伦比亚','🇨🇴',85,89,85,83,84,90]];const F=[['长期实力',25],['近期状态',20],['攻防质量',25],['阵容深度',12],['大赛经验',10],['健康状态',8]];const $=s=>document.querySelector(s);function init(){T.forEach(t=>{$('#ta').add(new Option(t[2]+' '+t[1],t[0]));$('#tb').add(new Option(t[2]+' '+t[1],t[0]))});$('#ta').value='ESP';$('#tb').value='ARG';$('#sliders').innerHTML=F.map((f,i)=>`<div class=row><div class=head><span>${f[0]}</span><b id=v${i}>${f[1]}%</b></div><input data-i=${i} type=range min=0 max=45 value=${f[1]}></div>`).join('');document.querySelectorAll('input').forEach(x=>x.oninput=()=>{F[x.dataset.i][1]=+x.value;$('#v'+x.dataset.i).textContent=x.value+'%';calc()});$('#ta').onchange=calc;$('#tb').onchange=calc;$('#run').onclick=()=>{T.forEach(t=>t.n=(Math.random()-.5)*1.2);calc();show()};calc()}function score(t){let s=F.reduce((a,f)=>a+f[1],0)||1;return F.reduce((a,f,i)=>a+t[i+3]*f[1]/s,0)+(t.n||0)}function ranking(){let r=T.map(t=>({t,s:score(t)})),m=Math.max(...r.map(x=>x.s)),e=r.map(x=>Math.exp((x.s-m)/4.2)),z=e.reduce((a,b)=>a+b,0);return r.map((x,i)=>({...x,p:e[i]/z*100})).sort((a,b)=>b.p-a.p)}function calc(){let r=ranking(),c=r[0],a=T.find(t=>t[0]===$('#ta').value),b=T.find(t=>t[0]===$('#tb').value);if(a===b){b=T.find(t=>t!==a);$('#tb').value=b[0]}let d=(score(a)-score(b))/7.2,p=100/(1+Math.exp(-d));$('#cf').textContent=c.t[2];$('#cn').textContent=c.t[1];$('#cp').textContent=c.p.toFixed(1)+'%';$('#fa').textContent=a[2];$('#na').textContent=a[1];$('#pa').textContent=p.toFixed(1)+'%';$('#fb').textContent=b[2];$('#nb').textContent=b[1];$('#pb').textContent=(100-p).toFixed(1)+'%';$('#ba').style.width=p+'%';$('#bb').style.width=(100-p)+'%';$('#note').textContent=(p>=50?a[1]:b[1])+'目前略占优势，但单场淘汰赛仍有明显偶然性。';$('#rank').innerHTML=r.slice(0,8).map((x,i)=>`<div class=item><span>${i+1}</span><span>${x.t[2]} ${x.t[1]}</span><div class=mini><i style="width:${Math.min(100,x.p*3.2)}%"></i></div><b>${x.p.toFixed(1)}%</b></div>`).join('')}function show(){let x=$('#toast');x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1400)}init();</script></body></html>
